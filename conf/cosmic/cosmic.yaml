nodes:
  - name: node1
    ip: 172.18.100.216
    port: 8181
  - name: node2
    ip: 172.18.100.217
    port: 8181
  - name: node3
    ip: 172.18.100.218
    port: 8181

jobs:
  - name: server
    targets:
      - node1
    envs:
      - name: APUSIC_HOME
        value: /opt/kingdee/cosmic
      - name: APUSIC_DEVICE
        value: vdb
    rules:
      - name: test
        path: ./conf/cosmic/rules/server.yaml
  - name: admq
    targets:
      - node1
    envs:
      - name: APUSIC_HOME
        value: /opt/kingdee/cosmic
    rules:
      - name: test
        path: ./conf/cosmic/rules/admq.yaml
  - name: amdc
    targets:
      - node1
    envs:
      - name: APUSIC_HOME
        value: /opt/kingdee/cosmic
      - name: APUSIC_AMDC_PASSWORD
        value: Cosmic@3021
    rules:
      - name: test
        path: ./conf/cosmic/rules/amdc.yaml
  - name: adcc
    targets:
      - node1
    envs:
      - name: APUSIC_HOME
        value: /opt/kingdee/cosmic
    rules:
      - name: test
        path: ./conf/cosmic/rules/adcc.yaml
  - name: alb
    targets:
      - node1
    envs:
      - name: APUSIC_HOME
        value: /opt/kingdee/cosmic
    rules:
      - name: test
        path: ./conf/cosmic/rules/alb.yaml
  - name: ailp
    targets:
      - node1
    envs:
      - name: APUSIC_HOME
        value: /opt/kingdee/cosmic
      - name: APUSIC_ES_USER
        value: elastic
      - name: APUSIC_ES_PASSWORD
        value: Cosmic@2020
      - name: APUSIC_IP
        value: 172.20.140.224
    rules:
      - name: test
        path: ./conf/cosmic/rules/ailp.yaml